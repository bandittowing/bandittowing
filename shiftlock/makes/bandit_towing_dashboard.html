<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bandit Towing — Vehicle Reference Dashboard</title>
<style>
:root {
  --bg: #0d0f14;
  --bg2: #151820;
  --bg3: #1c2030;
  --bg4: #242840;
  --border: #2a2e45;
  --text: #e8eaf0;
  --text2: #9aa0b8;
  --text3: #6a708a;
  --accent: #f97316;
  --accent2: #fb923c;
  --red: #ef4444;
  --red2: #dc2626;
  --yellow: #eab308;
  --green: #22c55e;
  --blue: #3b82f6;
  --purple: #a855f7;
  --teal: #14b8a6;
  --card-radius: 8px;
  --sidebar-w: 220px;
  --list-w: 320px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
#header {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 10px 16px; display: flex; align-items: center; gap: 12px;
  flex-shrink: 0; z-index: 100;
}
#logo { font-size: 18px; font-weight: 800; color: var(--accent); letter-spacing: -0.5px; white-space: nowrap; }
#logo span { color: var(--text2); font-weight: 400; font-size: 12px; }
#search-wrap { flex: 1; max-width: 480px; position: relative; }
#search { width: 100%; background: var(--bg3); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 7px 36px 7px 12px; font-size: 14px; outline: none; transition: border-color 0.2s; }
#search:focus { border-color: var(--accent); }
#search::placeholder { color: var(--text3); }
#search-icon { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 14px; }
#stats { font-size: 12px; color: var(--text3); white-space: nowrap; margin-left: auto; }
#stats b { color: var(--accent); }
#main { display: flex; flex: 1; overflow: hidden; }
#sidebar {
  width: var(--sidebar-w); background: var(--bg2); border-right: 1px solid var(--border);
  overflow-y: auto; flex-shrink: 0; padding: 10px 0;
}
.sidebar-section { padding: 0 12px; margin-bottom: 12px; }
.sidebar-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); margin-bottom: 6px; }
.make-btn {
  display: block; width: 100%; text-align: left; background: none; border: none;
  color: var(--text2); padding: 5px 8px; border-radius: 4px; font-size: 13px;
  cursor: pointer; transition: all 0.15s;
}
.make-btn:hover { background: var(--bg3); color: var(--text); }
.make-btn.active { background: var(--bg4); color: var(--accent); font-weight: 600; }
.make-btn .make-count { float: right; font-size: 11px; color: var(--text3); background: var(--bg3); padding: 1px 5px; border-radius: 10px; }
.make-btn.active .make-count { background: var(--bg4); color: var(--accent2); }
#filter-all { background: var(--bg3); color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 5px 10px; font-size: 12px; cursor: pointer; width: 100%; margin-bottom: 8px; }
#filter-all:hover { border-color: var(--accent); color: var(--accent); }
.filter-chip {
  display: inline-flex; align-items: center; gap: 4px; font-size: 11px; padding: 3px 8px;
  border-radius: 12px; border: 1px solid var(--border); background: none; color: var(--text3);
  cursor: pointer; margin: 2px; transition: all 0.15s;
}
.filter-chip:hover { border-color: var(--text2); color: var(--text); }
.filter-chip.active { border-color: var(--accent); background: rgba(249,115,22,0.15); color: var(--accent); }
.filter-chip.red.active { border-color: var(--red); background: rgba(239,68,68,0.15); color: var(--red); }
.filter-chip.yellow.active { border-color: var(--yellow); background: rgba(234,179,8,0.15); color: var(--yellow); }
.filter-chip.blue.active { border-color: var(--blue); background: rgba(59,130,246,0.15); color: var(--blue); }
.filter-chip.purple.active { border-color: var(--purple); background: rgba(168,85,247,0.15); color: var(--purple); }
#list-panel {
  width: var(--list-w); background: var(--bg2); border-right: 1px solid var(--border);
  overflow-y: auto; flex-shrink: 0;
}
#list-header {
  padding: 10px 12px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; background: var(--bg2); z-index: 10;
}
#list-count { font-size: 12px; color: var(--text3); }
#sort-select { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); border-radius: 4px; padding: 3px 8px; font-size: 12px; cursor: pointer; }
.veh-card {
  padding: 10px 14px; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background 0.15s; position: relative;
}
.veh-card:hover { background: var(--bg3); }
.veh-card.selected { background: var(--bg4); border-left: 3px solid var(--accent); padding-left: 11px; }
.veh-make { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text3); margin-bottom: 2px; }
.veh-model { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.3; }
.veh-years { font-size: 12px; color: var(--text2); margin-top: 1px; }
.badge-row { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 5px; }
.badge { font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
.badge-red { background: rgba(239,68,68,0.2); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
.badge-orange { background: rgba(249,115,22,0.2); color: #fb923c; border: 1px solid rgba(249,115,22,0.3); }
.badge-yellow { background: rgba(234,179,8,0.2); color: #fbbf24; border: 1px solid rgba(234,179,8,0.3); }
.badge-blue { background: rgba(59,130,246,0.2); color: #60a5fa; border: 1px solid rgba(59,130,246,0.3); }
.badge-green { background: rgba(34,197,94,0.2); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
.badge-purple { background: rgba(168,85,247,0.2); color: #c084fc; border: 1px solid rgba(168,85,247,0.3); }
.badge-teal { background: rgba(20,184,166,0.2); color: #2dd4bf; border: 1px solid rgba(20,184,166,0.3); }
.badge-gray { background: rgba(100,116,139,0.2); color: #94a3b8; border: 1px solid rgba(100,116,139,0.3); }
#detail-panel { flex: 1; overflow-y: auto; background: var(--bg); padding: 0; }
#detail-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text3); gap: 12px; }
#detail-empty .icon { font-size: 48px; opacity: 0.3; }
#detail-content { display: none; }
.detail-header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 16px 20px; position: sticky; top: 0; z-index: 10; }
.detail-make { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); }
.detail-title { font-size: 22px; font-weight: 800; color: var(--text); line-height: 1.2; margin: 2px 0; }
.detail-meta { font-size: 13px; color: var(--text2); display: flex; flex-wrap: wrap; gap: 12px; margin-top: 4px; }
.detail-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
.warn-banner { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.4); border-radius: 6px; padding: 10px 14px; margin: 12px 20px 0; font-size: 13px; color: #fca5a5; display: flex; align-items: flex-start; gap: 8px; }
.warn-banner .icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.tab-bar { display: flex; border-bottom: 1px solid var(--border); background: var(--bg2); padding: 0 20px; overflow-x: auto; }
.tab-btn { background: none; border: none; color: var(--text3); font-size: 13px; font-weight: 500; padding: 10px 14px; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: all 0.15s; }
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
.tab-btn .tab-badge { display: inline-flex; align-items: center; justify-content: center; background: var(--red); color: white; border-radius: 8px; font-size: 9px; font-weight: 700; padding: 1px 5px; margin-left: 4px; }
.tab-content { display: none; padding: 16px 20px; }
.tab-content.active { display: block; }
.info-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--card-radius); padding: 14px 16px; margin-bottom: 12px; }
.info-card-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text3); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.info-card-title .icon { font-size: 14px; }
.field-row { display: flex; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.field-row:last-child { border-bottom: none; }
.field-label { color: var(--text3); min-width: 120px; flex-shrink: 0; }
.field-val { color: var(--text); flex: 1; line-height: 1.5; }
.steps-list { list-style: none; counter-reset: step; }
.steps-list li { counter-increment: step; display: flex; gap: 10px; padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 13px; line-height: 1.5; color: var(--text); }
.steps-list li:last-child { border-bottom: none; }
.steps-list li::before { content: counter(step); display: flex; align-items: center; justify-content: center; min-width: 22px; height: 22px; background: var(--bg4); color: var(--accent); border-radius: 50%; font-size: 11px; font-weight: 700; flex-shrink: 0; margin-top: 1px; }
.bullet-list { list-style: none; }
.bullet-list li { padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 13px; line-height: 1.5; color: var(--text); display: flex; gap: 8px; }
.bullet-list li:last-child { border-bottom: none; }
.bullet-list li::before { content: "›"; color: var(--accent); font-size: 16px; flex-shrink: 0; line-height: 1.4; }
.tc-pos-list { list-style: none; }
.tc-pos-item { padding: 6px 10px; border-radius: 4px; font-size: 12px; margin-bottom: 4px; display: flex; align-items: flex-start; gap: 8px; }
.tc-pos-ok { background: rgba(34,197,94,0.08); color: #86efac; border-left: 3px solid #22c55e; }
.tc-pos-warn { background: rgba(234,179,8,0.08); color: #fde68a; border-left: 3px solid #eab308; }
.tc-pos-bad { background: rgba(239,68,68,0.08); color: #fca5a5; border-left: 3px solid #ef4444; }
.issue-card { background: rgba(239,68,68,0.06); border: 1px solid rgba(239,68,68,0.25); border-radius: var(--card-radius); padding: 12px 14px; margin-bottom: 8px; }
.issue-title { font-size: 13px; font-weight: 700; color: #f87171; margin-bottom: 6px; }
.issue-detail { font-size: 13px; color: var(--text2); line-height: 1.6; }
.qref-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-bottom: 12px; }
.qref-item { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--card-radius); padding: 12px 14px; }
.qref-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text3); margin-bottom: 4px; }
.qref-val { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.4; }
.qref-item.highlight { border-color: var(--accent); background: rgba(249,115,22,0.06); }
.qref-item.highlight .qref-val { color: var(--accent2); }
.qref-item.danger { border-color: var(--red); background: rgba(239,68,68,0.06); }
.qref-item.danger .qref-val { color: #f87171; }
.bat-type { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 4px; }
.bat-standard { background: rgba(34,197,94,0.15); color: #4ade80; }
.bat-agm { background: rgba(59,130,246,0.15); color: #60a5fa; }
.bat-aux { background: rgba(249,115,22,0.15); color: #fb923c; }
.empty-list { padding: 40px 20px; text-align: center; color: var(--text3); font-size: 13px; }
#export-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text3); border-radius: 4px; padding: 5px 12px; font-size: 12px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
#export-btn:hover { border-color: var(--accent); color: var(--accent); }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text3); }
@media (max-width: 900px) { #sidebar { display: none; } :root { --list-w: 260px; } }
@media (max-width: 640px) { #list-panel { display: none; } }
</style>
</head>
<body>
<div id="header">
  <div id="logo">BANDIT TOWING <span>Vehicle Reference</span></div>
  <div id="search-wrap">
    <input id="search" type="text" placeholder="Search make, model, or year..." autocomplete="off" />
    <span id="search-icon">⌕</span>
  </div>
  <div id="stats">Showing <b id="showing-count">0</b> of <b>242</b> vehicles</div>
  <button id="export-btn" onclick="exportJSON()">⬇ Export JSON</button>
</div>
<div id="main">
  <div id="sidebar">
    <div class="sidebar-section">
      <button id="filter-all" onclick="clearFilters()">Show All Makes</button>
      <div class="sidebar-label">Filter by Make</div>
      <div id="make-buttons"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Drivetrain</div>
      <div id="dt-filters">
        <button class="filter-chip red" data-dt="FLATBED" onclick="toggleDt(this)">⚠ Flatbed Only</button>
        <button class="filter-chip" data-dt="4WD" onclick="toggleDt(this)">4WD/4x4</button>
        <button class="filter-chip" data-dt="AWD" onclick="toggleDt(this)">AWD</button>
        <button class="filter-chip" data-dt="RWD" onclick="toggleDt(this)">RWD</button>
        <button class="filter-chip" data-dt="FWD" onclick="toggleDt(this)">FWD</button>
        <button class="filter-chip" data-dt="EV" onclick="toggleDt(this)">EV/Electric</button>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Special Flags</div>
      <div>
        <button class="filter-chip yellow" data-flag="tc" onclick="toggleFlag(this)">Has Transfer Case</button>
        <button class="filter-chip red" data-flag="issues" onclick="toggleFlag(this)">Has Known Issues</button>
        <button class="filter-chip" data-flag="warn" onclick="toggleFlag(this)">Has Warning</button>
        <button class="filter-chip blue" data-flag="agm" onclick="toggleFlag(this)">AGM Battery</button>
        <button class="filter-chip purple" data-flag="hybrid" onclick="toggleFlag(this)">Hybrid/EV</button>
      </div>
    </div>
  </div>
  <div id="list-panel">
    <div id="list-header">
      <span id="list-count" class="list-count">— vehicles</span>
      <select id="sort-select" onchange="renderList()">
        <option value="make">Sort: Make</option>
        <option value="model">Sort: Model</option>
        <option value="year">Sort: Year</option>
      </select>
    </div>
    <div id="vehicle-list"></div>
  </div>
  <div id="detail-panel">
    <div id="detail-empty">
      <div class="icon">🚗</div>
      <div>Select a vehicle to view towing details</div>
      <div style="font-size:12px;margin-top:4px;">242 vehicles across 25 makes</div>
    </div>
    <div id="detail-content"></div>
  </div>
</div>

riants are even lower. Any approach angle to a flatbed must be carefully managed with ramps or approach plates. Load from rear only \u2014 never winch from front over a standard ramp angle."},{"title":"Carbon Ceramic Brakes \u2014 No Metal-to-Metal Contact","detail":"Many C7 Z06 and Grand Sport trims have carbon ceramic brake rotors. These are extremely expensive ($15,000+). Never use metal wheel chocks directly against the rotors. Use rubber-padded chocks only."}],"battery":{"location":"FRUNK (front trunk) \u2014 NOT in the engine bay. Open hood and look in front storage compartment.","jumpTerminals":"Inside the frunk \u2014 standard red (+) / black (\u2212) terminals on battery","type":"standard-12v","warnings":"Many operators waste time looking for the battery in the engine bay. It is NOT there. Open the hood \u2014 the frunk IS the storage area. Very low clearance \u2014 flatbed only."}},{"make":"Chevrolet","model":"Corvette C8","yearStart":2020,"yearEnd":2026,"trans":"8-speed DCT (auto)","slot":"Cover near electronic selector on center console \u2014 remove to expose slot","shift":["Press START without brake (ON mode).","Remove cover near electronic selector.","Insert key, press down.","Press brake. Move electronic selector to N.","Replace cover."],"neutral":["Apply parking brake.","Battery: MID-ENGINE \u2014 access panel BEHIND passenger seat or in frunk.","Connect jump pack.","Shift normally or use slot.","E-Ray hybrid: 12V terminals only."],"notes":"C8 is MID-ENGINE \u2014 battery location differs from all previous Corvettes.","warn":"FLATBED ONLY for all C8. Extremely low clearance. Do not winch from front or rear.","drivetrain":"RWD or AWD (E-Ray)","towMethod":"FLATBED ONLY \u2014 mid-engine, extremely low clearance. AWD without flatbed: wheel-lift with dollies on opposite axle.","tc":null,"towNotes":["LOW CLEARANCE VEHICLE: Use flatbed. Check ground clearance before attempting any wheel-lift \u2014 front splitter/rear diffuser damage is common.","DUAL-CLU ood.","Connect jump pack. Shift normally or use slot."],"notes":"AWD optional.","warn":"","drivetrain":"FWD or AWD","towMethod":"FWD: lift from rear \u2014 front (drive) wheels roll on ground. AWD: flatbed only. AWD without flatbed: wheel-lift with dollies on opposite axle. Wheel-lift max: 35 mph, 50 miles \u2014 flatbed preferred for longer distances.","tc":null,"towNotes":["FWD: Lift from REAR. Front (drive) wheels stay on the ground and roll freely. If rear-lift is not possible, place wheel dollies under the REAR wheels and tow front-first.","CVT EQUIPPED: Do NOT exceed 35 mph or 50 miles with drive wheels on ground. Flatbed strongly preferred for CVTs."],"knownIssues":[],"battery":{"location":"Under hood","jumpTerminals":"Under hood \u2014 standard terminals","type":"standard-12v","warnings":""}},{"make":"Infiniti","model":"QX80 / QX56","yearStart":2004,"yearEnd":2026,"trans":"5-speed, 7-speed, or 8-speed automatic","slot":"Cap near gear selector base on console","shift":["Turn ignition to ON.","Find cap near selector base. Pry off.","Insert key, press down.","Press brake. Move to N."],"neutral":["Apply parking brake.","Battery under hood.","Connect jump pack. Shift normally or use slot."],"notes":"AWD standard. Large luxury SUV.","warn":"AWD \u2014 flatbed preferred.","drivetrain":"RWD or 4WD (part-time)","towMethod":"RWD/2WD: lift from front \u2014 rear (drive) wheels roll on ground. 4WD: transfer case to 2H first. Wheel-lift max: 35 mph, 50 miles \u2014 flatbed preferred for longer distances.","tc":{"type":"Electric push-button on center console","positions":["2WD \u2014 rear wheels only \u2014 REQUIRED for road towing","4WD Auto \u2014 automatic AWD \u2014 NOT safe for towing","4WD Hi \u2014 part-time 4WD \u2014 NOT safe for dry-road towing","4WD Lo \u2014 low range \u2014 NEVER tow in this position"],"steps":["Stop or slow under 3 MPH.","Press the 2WD button on the center console.","Confirm the 2WD indicator illuminates.","Safe to lift rear wheels once conf let filteredMake=null,filteredDt=null,filteredFlag=null,searchVal='',selectedIdx=null;
const makes=[...new Set(VEHICLES.map(v=>v.make))].sort();
const makeCounts={};
makes.forEach(m=>makeCounts[m]=VEHICLES.filter(v=>v.make===m).length);
function buildMakeButtons(){
  document.getElementById('make-buttons').innerHTML=makes.map(m=>`<button class="make-btn" onclick="filterMake('${m}')" data-make="${m}">${m} <span class="make-count">${makeCounts[m]}</span></button>`).join('');
}
function filterMake(m){filteredMake=filteredMake===m?null:m;document.querySelectorAll('.make-btn').forEach(b=>b.classList.toggle('active',b.dataset.make===filteredMake));renderList();}
function toggleDt(btn){filteredDt=btn.dataset.dt===filteredDt?null:btn.dataset.dt;document.querySelectorAll('[data-dt]').forEach(b=>b.classList.toggle('active',b.dataset.dt===filteredDt));renderList();}
function toggleFlag(btn){const f=btn.dataset.flag;filteredFlag=filteredFlag===f?null:f;document.querySelectorAll('[data-flag]').forEach(b=>b.classList.toggle('active',b.dataset.flag===filteredFlag));renderList();}
function clearFilters(){filteredMake=null;filteredDt=null;filteredFlag=null;document.querySelectorAll('.make-btn,[data-dt],[data-flag]').forEach(b=>b.classList.remove('active'));renderList();}
function getFiltered(){
  let list=VEHICLES;
  const q=searchVal.trim().toLowerCase();
  if(q)list=list.filter(v=>(v.make+' '+v.model+' '+v.yearStart+'-'+v.yearEnd).toLowerCase().includes(q)||String(v.yearStart).includes(q)||String(v.yearEnd).includes(q));
  if(filteredMake)list=list.filter(v=>v.make===filteredMake);
  if(filteredDt){
    if(filteredDt==='EV')list=list.filter(v=>(v.towMethod||'').toLowerCase().includes('flatbed only')&&(v.trans||'').toLowerCase().includes('electric'));
    else if(filteredDt==='FLATBED')list=list.filter(v=>(v.towMethod||'').toUpperCase().includes('FLATBED ONLY'));
    else list=list.filter(v=>(v.drivetrain||'').toUpperCase().includes(filteredDt));
  }
  if(filteredFlag){
    if(filteredFlag==='tc')list=list.filter(v=>v.tc);
    else if(filteredFlag==='issues')list=list.filter(v=>v.knownIssues&&v.knownIssues.length>0);
    else if(filteredFlag==='warn')list=list.filter(v=>v.warn&&v.warn.trim());
    else if(filteredFlag==='agm')list=list.filter(v=>v.battery&&v.battery.type==='agm-12v');
    else if(filteredFlag==='hybrid')list=list.filter(v=>(v.trans||'').toLowerCase().includes('hybrid')||(v.trans||'').toLowerCase().includes('ecvt')||(v.battery&&v.battery.type==='auxiliary-12v-only'));
  }
  const s=document.getElementById('sort-select')?.value||'make';
  return [...list].sort((a,b)=>s==='year'?a.yearStart-b.yearStart:s==='model'?a.model.localeCompare(b.model):a.make.localeCompare(b.make)||a.model.localeCompare(b.model));
}
function getBadges(v){
  const b=[];const td=(v.towMethod||'').toUpperCase();const tr=(v.trans||'').toLowerCase();const dt=(v.drivetrain||'').toUpperCase();
  if(td.includes('FLATBED ONLY'))b.push(['FLATBED ONLY','badge-red']);
  else if(td.includes('FLATBED'))b.push(['FLATBED PREF','badge-orange']);
  if(tr.includes('electric')||(v.battery&&v.battery.type==='auxiliary-12v-only'))b.push(['EV','badge-teal']);
  if(tr.includes('hybrid')||tr.includes('ecvt'))b.push(['HYBRID','badge-green']);
  if(v.tc)b.push(['4WD/TC','badge-yellow']);
  if(dt.includes('AWD')&&!dt.includes('4WD'))b.push(['AWD','badge-blue']);
  if(v.knownIssues&&v.knownIssues.length)b.push([v.knownIssues.length+' ISSUE'+(v.knownIssues.length>1?'S':''),'badge-red']);
  if(v.battery&&v.battery.type==='agm-12v')b.push(['AGM','badge-purple']);
  return b;
}
function renderList(){
  const list=getFiltered();
  document.getElementById('list-count').textContent=list.length+' vehicle'+(list.length!==1?'s':'');
  document.getElementById('showing-count').textContent=list.length;
  const el=document.getElementById('vehicle-list');
  if(!list.length){el.innerHTML='<div class="empty-list">No vehicles match your search</div>';return;}
  el.innerHTML=list.map(v=>{
    const gi=VEHICLES.indexOf(v);
    const badges=getBadges(v);
    return`<div class="veh-card${gi===selectedIdx?' selected':''}" onclick="selectVehicle(${gi})">
      <div class="veh-make">${v.make}</div>
      <div class="veh-model">${v.model}</div>
      <div class="veh-years">${v.yearStart}–${v.yearEnd}</div>
      ${badges.length?`<div class="badge-row">${badges.map(([l,c])=>`<span class="badge ${c}">${l}</span>`).join('')}</div>`:''}
    </div>`;
  }).join('');
}
function escHtml(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function batTypeClass(t){if(!t)return'bat-standard';if(t==='agm-12v')return'bat-agm';if(t==='auxiliary-12v-only')return'bat-aux';return'bat-standard';}
function batTypeLabel(t){if(!t)return'12V Standard';if(t==='agm-12v')return'AGM 12V';if(t==='auxiliary-12v-only')return'12V Auxiliary Only';return'12V Standard';}
function stepsHTML(arr){return arr&&arr.length?`<ul class="steps-list">${arr.map(s=>`<li>${escHtml(s)}</li>`).join('')}</ul>`:'<span style="color:var(--text3)">No data</span>';}
function bulletsHTML(arr){return arr&&arr.length?`<ul class="bullet-list">${arr.map(s=>`<li>${escHtml(s)}</li>`).join('')}</ul>`:'<span style="color:var(--text3)">None</span>';}
function tcPosClass(p){const u=p.toUpperCase();if(u.includes('NEVER')||u.includes('NOT SAFE'))return'tc-pos-bad';if(u.includes('REQUIRED')||(u.includes('ONLY')&&!u.includes('NOT')))return'tc-pos-ok';return'tc-pos-warn';}

      <div class="info-card">
        <div class="info-card-title"><span class="icon">🔋</span>Battery Details</div>
        <div class="field-row"><span class="field-label">Location</span><span class="field-val">${escHtml(v.battery?.location||'—')}</span></div>
        <div class="field-row"><span class="field-label">Jump Terminals</span><span class="field-val">${escHtml(v.battery?.jumpTerminals||'—')}</span></div>
        <div class="field-row"><span class="field-label">Battery Type</span><span class="field-val"><span class="bat-type ${batTypeClass(v.battery?.type)}">${batTypeLabel(v.battery?.type)}</span></span></div>
      </div>
      ${v.battery?.warnings?`<div class="info-card" style="border-color:rgba(239,68,68,0.4);background:rgba(239,68,68,0.04)"><div class="info-card-title" style="color:#f87171"><span class="icon">⚠️</span>Warnings</div><div style="font-size:13px;color:#fca5a5;line-height:1.6">${escHtml(v.battery.warnings)}</div></div>`:''}
    </div>
    <div id="tm" class="tab-content">
      <div class="info-card" style="${isFlatbedOnly?'border-color:rgba(239,68,68,0.4);background:rgba(239,68,68,0.06)':''}">
        <div class="info-card-title"><span class="icon">🚛</span>Tow Method</div>
        <div style="font-size:13px;color:${isFlatbedOnly?'#f87171':'var(--text2)'};line-height:1.6;font-weight:${isFlatbedOnly?'600':'400'}">${escHtml(v.towMethod||'—')}</div>
      </div>
      ${v.towNotes&&v.towNotes.length?`<div class="info-card"><div class="info-card-title"><span class="icon">📌</span>Tow Notes</div>${bulletsHTML(v.towNotes)}</div>`:''}
    </div>
    ${hasTC?`
    <div id="tt" class="tab-content">
      <div class="info-card"><div class="info-card-title"><span class="icon">⚙️</span>TC Type</div><div style="font-size:13px;color:var(--text2);line-height:1.5">${escHtml(v.tc.type)}</div></div>
      <div class="info-card"><div class="info-card-title"><span class="icon">📍</span>Positions</div><ul class="tc-pos-list">${v.tc.positions.map(p=>`<li class="tc-pos-item ${tcPosClass(p)}">${escHtml(p)}</li>`).join('')}</ul></div>
      <div class="info-card"><div class="info-card-title"><span class="icon">📝</span>Steps</div>${stepsHTML(v.tc.steps)}</div>
    </div>`:''}
    <div id="ti" class="tab-content">
      ${hasIssues?v.knownIssues.map(i=>`<div class="issue-card"><div class="issue-title">⚠ ${escHtml(i.title)}</div><div class="issue-detail">${escHtml(i.detail)}</div></div>`).join(''):'<div style="color:var(--text3);padding:20px;text-align:center;font-size:14px;">✓ No known issues documented</div>'}
    </div>
  `;
}
function switchTab(btn,tabId){
  const dc=btn.closest('#detail-content');
  dc.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  dc.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(tabId)?.classList.add('active');
}
function exportJSON(){
  const toExport=selectedIdx!==null?VEHICLES[selectedIdx]:getFiltered();
  const v=selectedIdx!==null?VEHICLES[selectedIdx]:null;
  const blob=new Blob([JSON.stringify(toExport,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=v?`${v.make}_${v.model.replace(/[^a-zA-Z0-9]/g,'_')}.json`:'bandit_towing_vehicles.json';
  a.click();
}
document.getElementById('search').addEventListener('input',e=>{searchVal=e.target.value;renderList();});
document.getElementById('sort-select').addEventListener('change',()=>renderList());
buildMakeButtons();
renderList();
</script>
</body>
</html>
